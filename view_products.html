<!DOCTYPE html>
<html>
<head>
    <title>Inventory</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(to right, #e0f7fa, #ffffff);
            text-align: center;
        }

        .navbar {
            background-color: #00695c;
            color: white;
            padding: 20px;
            font-size: 24px;
            font-weight: bold;
        }

        table {
            margin: 30px auto;
            border-collapse: collapse;
            width: 85%;
            background: white;
            box-shadow: 0px 6px 18px rgba(0,0,0,0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }

        th {
            background: teal;
            color: white;
        }

        button {
            padding: 6px 10px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            margin: 2px;
        }

        .edit {
            background-color: orange;
            color: white;
        }

        .delete {
            background-color: crimson;
            color: white;
        }
    </style>
</head>

<body>

    <div class="navbar">Inventory</div>

    <table id="table">
        <tr>
            <th>Name</th>
            <th>Price</th>
            <th>Quantity</th>
            <th>Actions</th>
        </tr>
    </table>

    <br>
    <a href="dashboard.html">⬅ Back</a>

    <script>
        let products = JSON.parse(localStorage.getItem("products")) || [];

        function loadTable() {
            let table = document.getElementById("table");

            // Clear old rows (keep header)
            table.innerHTML = `
                <tr>
                    <th>Name</th>
                    <th>Price</th>
                    <th>Quantity</th>
                    <th>Actions</th>
                </tr>
            `;

            products.forEach((p, index) => {
                let row = table.insertRow();

                row.insertCell(0).innerText = p.name;
                row.insertCell(1).innerText = p.price;
                row.insertCell(2).innerText = p.quantity;

                let actions = row.insertCell(3);

                actions.innerHTML = `
                    <button class="edit" onclick="editProduct(${index})">Edit</button>
                    <button class="delete" onclick="deleteProduct(${index})">Delete</button>
                `;
            });
        }

        function editProduct(index) {
            let newName = prompt("Enter new name:", products[index].name);
            let newPrice = prompt("Enter new price:", products[index].price);
            let newQty = prompt("Enter new quantity:", products[index].quantity);

            if (newName && newPrice && newQty) {
                products[index] = {
                    name: newName,
                    price: newPrice,
                    quantity: newQty
                };

                localStorage.setItem("products", JSON.stringify(products));
                loadTable();
            }
        }

        function deleteProduct(index) {
            if (confirm("Are you sure you want to delete this product?")) {
                products.splice(index, 1);

                localStorage.setItem("products", JSON.stringify(products));
                loadTable();
            }
        }

        loadTable();
    </script>

</body>
</html>
